<svg viewBox="0 0 900 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="monospace" font-size="12">
  <title>eks-gitops infrastructure diagram</title>
  <desc>Full GitOps pipeline from GitHub repos to AWS EKS cluster with ArgoCD</desc>

  <!-- Background -->
  <rect width="900" height="720" fill="#0f1117"/>

  <!-- GITHUB SECTION -->
  <rect x="20" y="20" width="860" height="130" rx="8" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="36" y="42" fill="#8b949e" font-size="11" font-weight="bold">GITHUB</text>

  <rect x="40" y="52" width="200" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="140" y="74" fill="#e6edf3" text-anchor="middle" font-weight="bold">eks-gitops-app</text>
  <text x="140" y="92" fill="#8b949e" text-anchor="middle">server.go · Dockerfile</text>
  <text x="140" y="108" fill="#8b949e" text-anchor="middle">git_update.sh</text>
  <text x="140" y="124" fill="#58a6ff" text-anchor="middle">→ GitHub Actions CI</text>

  <rect x="280" y="52" width="200" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="74" fill="#e6edf3" text-anchor="middle" font-weight="bold">eks-gitops-k8s</text>
  <text x="380" y="92" fill="#8b949e" text-anchor="middle">base/ · environments/</text>
  <text x="380" y="108" fill="#8b949e" text-anchor="middle">Kustomize overlays</text>
  <text x="380" y="124" fill="#8b949e" text-anchor="middle">ArgoCD Applications</text>

  <rect x="520" y="52" width="200" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="620" y="74" fill="#e6edf3" text-anchor="middle" font-weight="bold">eks-gitops-infra</text>
  <text x="620" y="92" fill="#8b949e" text-anchor="middle">shared/ · modules/</text>
  <text x="620" y="108" fill="#8b949e" text-anchor="middle">environments/</text>
  <text x="620" y="124" fill="#3fb950" text-anchor="middle">→ terraform apply</text>

  <!-- Arrows GitHub to AWS -->
  <line x1="140" y1="150" x2="140" y2="210" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="145" y="187" fill="#58a6ff" font-size="10">OIDC</text>
  <polygon points="140,210 135,200 145,200" fill="#58a6ff"/>

  <line x1="380" y1="150" x2="380" y2="390" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="380,150 375,160 385,160" fill="#8b949e"/>

  <line x1="620" y1="150" x2="620" y2="210" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="620,210 615,200 625,200" fill="#3fb950"/>

  <!-- AWS SECTION -->
  <rect x="20" y="200" width="860" height="490" rx="8" fill="none" stroke="#e47911" stroke-width="1.5"/>
  <text x="36" y="222" fill="#e47911" font-size="11" font-weight="bold">AWS — eu-west-3</text>

  <!-- SHARED -->
  <rect x="40" y="232" width="380" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="230" y="252" fill="#8b949e" text-anchor="middle" font-size="11">SHARED</text>

  <rect x="55" y="260" width="100" height="58" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="105" y="278" fill="#e6edf3" text-anchor="middle" font-size="11" font-weight="bold">S3</text>
  <text x="105" y="294" fill="#8b949e" text-anchor="middle" font-size="10">tfstate-eks-gitops</text>
  <text x="105" y="308" fill="#8b949e" text-anchor="middle" font-size="10">lock · AES256</text>

  <rect x="165" y="260" width="100" height="58" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="215" y="278" fill="#e6edf3" text-anchor="middle" font-size="11" font-weight="bold">ECR</text>
  <text x="215" y="294" fill="#8b949e" text-anchor="middle" font-size="10">eks-gitops-app</text>
  <text x="215" y="308" fill="#8b949e" text-anchor="middle" font-size="10">IMMUTABLE · scan</text>

  <rect x="275" y="260" width="130" height="58" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="340" y="278" fill="#e6edf3" text-anchor="middle" font-size="11" font-weight="bold">IAM</text>
  <text x="340" y="294" fill="#8b949e" text-anchor="middle" font-size="10">github-actions-eks-gitops</text>
  <text x="340" y="308" fill="#8b949e" text-anchor="middle" font-size="10">OIDC · ECR push</text>

  <!-- Arrow CI to ECR -->
  <line x1="140" y1="210" x2="215" y2="260" stroke="#58a6ff" stroke-width="1.5"/>
  <polygon points="215,260 207,252 217,250" fill="#58a6ff"/>
  <text x="155" y="240" fill="#58a6ff" font-size="10">push image</text>

  <!-- VPC -->
  <rect x="40" y="348" width="820" height="326" rx="6" fill="#161b22" stroke="#e47911" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="56" y="368" fill="#e47911" font-size="11">VPC — 10.0.0.0/16</text>

  <rect x="56" y="378" width="180" height="48" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="146" y="397" fill="#8b949e" text-anchor="middle" font-size="10">PUBLIC SUBNETS</text>
  <text x="146" y="413" fill="#8b949e" text-anchor="middle" font-size="10">10.0.64/19 · 10.0.96/19</text>

  <rect x="250" y="378" width="80" height="48" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="290" y="397" fill="#e6edf3" text-anchor="middle" font-size="11" font-weight="bold">NAT GW</text>
  <text x="290" y="413" fill="#8b949e" text-anchor="middle" font-size="10">Elastic IP</text>

  <!-- EKS Cluster -->
  <rect x="56" y="440" width="788" height="216" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="72" y="460" fill="#58a6ff" font-size="11" font-weight="bold">EKS Cluster — dev-main</text>
  <text x="420" y="460" fill="#8b949e" font-size="10" text-anchor="middle">Private subnets · K8s 1.32 · Auth mode: API</text>

  <!-- Node Group -->
  <rect x="72" y="468" width="160" height="170" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="152" y="486" fill="#e6edf3" text-anchor="middle" font-size="11" font-weight="bold">Node Group</text>
  <text x="152" y="502" fill="#8b949e" text-anchor="middle" font-size="10">t3.medium · ON_DEMAND</text>
  <text x="152" y="518" fill="#8b949e" text-anchor="middle" font-size="10">desired: 2 · max: 10</text>
  <rect x="84" y="526" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="152" y="541" fill="#3fb950" text-anchor="middle" font-size="10">Pod Identity Agent</text>
  <rect x="84" y="552" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="152" y="567" fill="#8b949e" text-anchor="middle" font-size="10">IAM role: eks-nodes</text>
  <rect x="84" y="578" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="152" y="593" fill="#8b949e" text-anchor="middle" font-size="10">ECR pull · CNI · worker</text>
  <rect x="84" y="604" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="152" y="619" fill="#8b949e" text-anchor="middle" font-size="10">Single AZ (cost)</text>

  <!-- ArgoCD -->
  <rect x="248" y="468" width="160" height="170" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="328" y="486" fill="#e6edf3" text-anchor="middle" font-size="11" font-weight="bold">ArgoCD</text>
  <text x="328" y="502" fill="#8b949e" text-anchor="middle" font-size="10">ns: argocd</text>
  <rect x="260" y="510" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="328" y="525" fill="#8b949e" text-anchor="middle" font-size="10">App of Apps pattern</text>
  <rect x="260" y="536" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="328" y="551" fill="#8b949e" text-anchor="middle" font-size="10">poll eks-gitops-k8s</text>
  <rect x="260" y="562" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="328" y="577" fill="#3fb950" text-anchor="middle" font-size="10">sync → rolling update</text>
  <rect x="260" y="588" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="328" y="603" fill="#8b949e" text-anchor="middle" font-size="10">prune · selfHeal</text>

  <!-- Image Updater -->
  <rect x="424" y="468" width="160" height="170" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="504" y="483" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="bold">Image Updater</text>
  <text x="504" y="498" fill="#8b949e" text-anchor="middle" font-size="10">ns: argocd</text>
  <rect x="436" y="506" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="504" y="521" fill="#8b949e" text-anchor="middle" font-size="10">Pod Identity → ECR</text>
  <rect x="436" y="532" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="504" y="547" fill="#8b949e" text-anchor="middle" font-size="10">poll ECR semver</text>
  <rect x="436" y="558" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="504" y="573" fill="#58a6ff" text-anchor="middle" font-size="10">commit tag → git</text>
  <rect x="436" y="584" width="136" height="22" rx="3" fill="#0d1117"/>
  <text x="504" y="599" fill="#8b949e" text-anchor="middle" font-size="10">write-back: git</text>

  <!-- LBC + NLB -->
  <rect x="600" y="468" width="228" height="170" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="714" y="486" fill="#e6edf3" text-anchor="middle" font-size="11" font-weight="bold">LBC + my-app</text>
  <rect x="612" y="494" width="204" height="36" rx="3" fill="#0d1117"/>
  <text x="714" y="509" fill="#8b949e" text-anchor="middle" font-size="10">Pod Identity → LBC IAM role</text>
  <text x="714" y="523" fill="#8b949e" text-anchor="middle" font-size="10">créer/gérer ALB/NLB</text>
  <rect x="612" y="534" width="204" height="36" rx="3" fill="#0d1117"/>
  <text x="714" y="549" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="bold">my-app (2 pods)</text>
  <text x="714" y="563" fill="#8b949e" text-anchor="middle" font-size="10">ns: my-app · /healthz /version</text>
  <rect x="612" y="574" width="204" height="58" rx="3" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="714" y="592" fill="#3fb950" text-anchor="middle" font-size="10" font-weight="bold">NLB internet-facing</text>
  <text x="714" y="608" fill="#8b949e" text-anchor="middle" font-size="10">xxxxxxxx.elb.eu-west-3</text>
  <text x="714" y="622" fill="#8b949e" text-anchor="middle" font-size="10">port 80 → pod 8080</text>

  <!-- Arrow ECR to Image Updater -->
  <line x1="215" y1="318" x2="504" y2="468" stroke="#e47911" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="340" y="390" fill="#e47911" font-size="10">poll tags</text>
  <polygon points="504,468 497,458 507,457" fill="#e47911"/>

  <!-- Arrow Image Updater to k8s repo -->
  <line x1="504" y1="468" x2="380" y2="150" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="460" y="310" fill="#8b949e" font-size="10">commit newTag</text>

  <!-- Arrow ArgoCD from k8s repo -->
  <line x1="380" y1="150" x2="328" y2="468" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="310" y="310" fill="#58a6ff" font-size="10">poll</text>

  <!-- Arrow ArgoCD to my-app -->
  <line x1="408" y1="540" x2="600" y2="560" stroke="#3fb950" stroke-width="1.5"/>
  <polygon points="600,560 590,554 592,564" fill="#3fb950"/>
  <text x="490" y="548" fill="#3fb950" font-size="10">sync</text>

  <!-- Internet arrow -->
  <line x1="714" y1="638" x2="714" y2="690" stroke="#3fb950" stroke-width="2"/>
  <polygon points="714,690 709,680 719,680" fill="#3fb950"/>
  <text x="724" y="668" fill="#3fb950" font-size="11">Internet</text>

  <!-- Legend -->
  <rect x="720" y="232" width="148" height="100" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="794" y="250" fill="#8b949e" text-anchor="middle" font-size="10" font-weight="bold">LÉGENDE</text>
  <line x1="730" y1="262" x2="755" y2="262" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="762" y="266" fill="#8b949e" font-size="10">OIDC / poll</text>
  <line x1="730" y1="278" x2="755" y2="278" stroke="#3fb950" stroke-width="1.5"/>
  <text x="762" y="282" fill="#8b949e" font-size="10">trafic / sync</text>
  <line x1="730" y1="294" x2="755" y2="294" stroke="#e47911" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="762" y="298" fill="#8b949e" font-size="10">poll ECR</text>
  <line x1="730" y1="310" x2="755" y2="310" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="762" y="314" fill="#8b949e" font-size="10">git write-back</text>
</svg>
